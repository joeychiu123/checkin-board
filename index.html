
<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>廠慶報到看板 — 領航躍進·連結一心</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#0a0f1a;font-family:sans-serif}
.screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem}
.title-bar{text-align:center;margin-bottom:1.5rem}
.title-bar p{font-size:11px;letter-spacing:.2em;color:#4a6080;text-transform:uppercase;margin-bottom:6px}
.title-bar h1{font-size:18px;letter-spacing:.1em;color:#8ab4d4;font-weight:400}
.star-wrap{position:relative;width:420px;height:420px;margin:0 auto}
.star-wrap svg{width:100%;height:100%}
.hint{text-align:center;font-size:11px;color:#2a4060;margin-top:.6rem;letter-spacing:.05em}
.dots{display:flex;gap:10px;margin-top:.8rem;justify-content:center}
.dot{width:10px;height:10px;border-radius:50%;background:#1e3050;transition:background .4s}
.dot.on{background:#c8971a}
.ctrl{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:1rem}
.ctrl button{padding:6px 16px;font-size:12px;border-radius:4px;border:.5px solid #2a4060;background:#0f1d2e;color:#6090b0;cursor:pointer;transition:all .2s;letter-spacing:.05em}
.ctrl button.on{background:#1a3a18;border-color:#2a6028;color:#6dc468}
.ctrl button:hover{border-color:#4a7090;color:#8ab4d4}
.reset-btn{font-size:11px;color:#2a4060;background:none;border:none;cursor:pointer;margin-top:.6rem;text-decoration:underline;display:block;margin-left:auto;margin-right:auto}

/* 開場覆蓋畫面 */
.overlay{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 1s;z-index:100}
.overlay.show{opacity:1;pointer-events:all}
.overlay-img{width:min(520px,85vw);height:min(520px,85vw);object-fit:contain;border-radius:50%;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
.overlay-leaves{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.leaf{position:absolute;opacity:0;animation:fall linear forwards}
@keyframes fall{
  0%{opacity:.9;transform:translateY(-30px) rotate(0deg) scale(1)}
  80%{opacity:.6}
  100%{opacity:0;transform:translateY(110vh) rotate(900deg) scale(.5)}
}

/* 全螢幕投影模式提示 */
.fullscreen-btn{position:fixed;top:12px;right:12px;padding:5px 12px;font-size:11px;border:.5px solid #2a4060;background:#0f1d2e;color:#4a6080;border-radius:3px;cursor:pointer;z-index:50;letter-spacing:.05em}
.fullscreen-btn:hover{color:#8ab4d4;border-color:#4a7090}
</style>
</head>
<body>

<button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ 全螢幕</button>
<input type="file" id="file-input" accept="image/*" style="display:none"/>

<div class="screen">
  <div class="title-bar">
    <p>gateway decryption terminal · activate all five seals</p>
    <h1>領航躍進 · 連結一心</h1>
  </div>

  <div class="star-wrap">

        <clipPath id="c2"><circle cx="295" cy="113" r="24"/></clipPath>
        <clipPath id="c3"><circle cx="248" cy="277" r="24"/></clipPath>
        <clipPath id="c4"><circle cx="72"  cy="277" r="24"/></clipPath>
        <clipPath id="c5"><circle cx="25"  cy="113" r="24"/></clipPath>
      </defs>

      <!-- 星形底 -->

        fill="#0d1b2e" stroke="#1a3050" stroke-width="1"/>

      <!-- 外框裝飾 -->

        <image id="img5" x="1" y="89" width="48" height="48" clip-path="url(#c5)" preserveAspectRatio="xMidYMid slice" style="display:none"/>
        <text id="ico5" x="25" y="118" text-anchor="middle" font-size="18" fill="#2a5070">+</text>
      </g>

      <!-- 組別標籤 -->
      <text x="160" y="6"   text-anchor="middle" font-size="8" fill="#3a5878">第1組</text>
      <text x="313" y="108" text-anchor="start"  font-size="8" fill="#3a5878">第2組</text>
      <text x="248" y="314" text-anchor="middle" font-size="8" fill="#3a5878">第3組</text>
      <text x="72"  y="314" text-anchor="middle" font-size="8" fill="#3a5878">第4組</text>
      <text x="4"   y="108" text-anchor="start"  font-size="8" fill="#3a5878">第5組</text>

      <text class="cl" x="160" y="178" text-anchor="middle" font-size="7.5" fill="#2a5028" letter-spacing=".12em" style="pointer-events:none">ENTER GATEWAY</text>

      <!-- 進度 -->
      <text id="prog" x="314" y="316" text-anchor="end" font-size="8" fill="#2a4060">SEAL 0 / 5</text>
    </svg>
  </div>

  <p class="hint">點擊圓圈更換圖片　·　點擊星角或下方按鈕模擬報到</p>

  <div class="dots">
    <div class="dot" id="d1"></div>
    <div class="dot" id="d2"></div>
    <div class="dot" id="d3"></div>

    <button id="btn2" onclick="toggle(2)">第2組到齊</button>

<script>
const arrived=[false,false,false,false,false];
let currentPick=null;

/* ── 換圖 ── */
function pickImage(n){
  currentPick=n;
  const fi=document.getElementById('file-input');
  fi.value='';
  fi.onchange=function(){
    const file=fi.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=function(e){
      const img=document.getElementById('img'+currentPick);
      const ico=document.getElementById('ico'+currentPick);
      img.setAttribute('href',e.target.result);
      img.style.display='block';
      ico.style.display='none';
    };
    reader.readAsDataURL(file);
  };
  fi.click();
}

/* ── 報到切換 ── */
function toggle(n){
  arrived[n-1]=!arrived[n-1];
  update();
}

function update(){
  const count=arrived.filter(Boolean).length;
  for(let i=1;i<=5;i++){
    const on=arrived[i-1];
    document.getElementById('tip'+i).setAttribute('fill',on?'#c8971a':'#1a3050');
    document.getElementById('ring'+i).setAttribute('stroke',on?'#c8971a':'#1e3a5a');
    document.getElementById('d'+i).classList.toggle('on',on);
    const btn=document.getElementById('btn'+i);
    btn.classList.toggle('on',on);
    btn.textContent=on?'✓ 第'+i+'組到齊':'第'+i+'組到齊';
  }
  document.getElementById('prog').textContent='SEAL '+count+' / 5';
  const allOn=count===5;
  const cb=document.getElementById('center-btn');
  cb.setAttribute('fill',allOn?'#1e3a1e':'#1a2a1a');
  cb.setAttribute('stroke',allOn?'#5dc458':'#2a5028');
  document.querySelectorAll('.cl').forEach(t=>t.setAttribute('fill',allOn?'#5dc458':'#2a5028'));
}

/* ── 開場畫面 ── */
function enterGateway(){
  if(!arrived.every(Boolean))return;
  spawnLeaves();
  document.getElementById('overlay').classList.add('show');
}

function closeOverlay(){
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('leaves').innerHTML='';
}

function spawnLeaves(){
  const container=document.getElementById('leaves');
  container.innerHTML='';
  const colors=['#c8971a','#e8b830','#a07010','#f0c840','#d4a020','#8a6010'];
  const shapes=['50% 0','0 50%','50% 50% 0 50%','30% 70%','50% 0 0 50%'];
  for(let i=0;i<60;i++){
    const l=document.createElement('div');
    l.className='leaf';
    const size=6+Math.random()*18;
    l.style.cssText=`
      left:${Math.random()*105-2}%;
      top:${Math.random()*-30}%;
      width:${size}px;
      height:${size*(0.6+Math.random()*0.8)}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      border-radius:${shapes[Math.floor(Math.random()*shapes.length)]};
      animation-duration:${2.5+Math.random()*4}s;
      animation-delay:${Math.random()*3}s;
    `;
    container.appendChild(l);
  }
}

/* ── 重置 ── */
function resetAll(){
  for(let i=0;i<5;i++)arrived[i]=false;
  update();
}

/* ── 全螢幕 ── */
function toggleFullscreen(){
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

// ── 從 Google Sheet 自動更新（每5秒）──

const SHEET_URL='https://script.google.com/macros/s/AKfycbyYF2DcZSKvh52kaSFCckN79Mcz3SnpDpPW6nqYiqaJaPpQSGltSbym6-IlIR7dX_zu/exec';

// 除錯狀態列
const dbg=document.createElement('div');
dbg.id='dbg';
dbg.style.cssText='position:fixed;bottom:8px;left:50%;transform:translateX(-50%);font-size:10px;color:#4a8;background:#0a1a0a;border:.5px solid #1a4a1a;padding:3px 10px;border-radius:3px;z-index:200;max-width:90vw;text-align:center';
document.body.appendChild(dbg);

let fetchCount=0;
setInterval(async()=>{
  fetchCount++;
  dbg.textContent='嘗試連線中 #'+fetchCount+'...';
  try{
    const res=await fetch(SHEET_URL+'?t='+Date.now(), {redirect:'follow'});
    if(!res.ok){dbg.textContent='❌ HTTP錯誤 '+res.status;return;}
    const data=await res.json();
    const statuses=data.map(r=>r.status);
    dbg.textContent='✅ 連線成功 | 狀態: ['+statuses.join(',')+'] | #'+fetchCount;
    data.forEach((row,i)=>{
      if(i<5) arrived[i]=(row.status==='1'||row.status===1);
    });
    update();
  }catch(e){
    dbg.textContent='❌ 錯誤: '+e.message+' | #'+fetchCount;
  }
},5000);
</script>
